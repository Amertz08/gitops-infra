apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.2/manifests/ha/install.yaml
  - httproute.yaml
  - certificate.yaml

patches:
  - path: argocd-params-patch.yaml
    target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
  - path: argocd-cm-patch.yaml
    target:
      kind: ConfigMap
      name: argocd-cm
  - path: argocd-server-ha-patch.yaml
    target:
      kind: Deployment
      name: argocd-server
  - path: argocd-application-controller-ha-patch.yaml
    target:
      kind: StatefulSet
      name: argocd-application-controller
  - path: argocd-repo-server-ha-patch.yaml
    target:
      kind: Deployment
      name: argocd-repo-server
