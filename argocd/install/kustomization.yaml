apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.2/manifests/install.yaml
  - httproute.yaml

patches:
  - path: argocd-params-patch.yaml
    target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
  - path: argocd-cm-patch.yaml
    target:
      kind: ConfigMap
      name: argocd-cm
