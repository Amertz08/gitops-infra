apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: team-a-prod

resources:
  - ../../base

images:
  - name: nginx
    newTag: "1.25"

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: example-app
